# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Mason小屋
subtitle: hanghang
description: 当下幸福，未来亦幸福！
author: 李航航
avatar: /images/logo.jpeg
language: zh-CN
timezone:
keywords:
- 李航航
- Mason
- 个人博客
- 知识图谱
- NLP
- 自然语言处理
- 机器学习
- 读书

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
## fixed loss CSS
url: https://lihanghang.top/
# url: https://github.com/lhhroots/lhhroots.github.io.git
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true
  field: site
  exclude:
  - lihanghang.top
filename_case: 0
render_drafts: true
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
marked:
  postAsset: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  
# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 5
  order_by: -date
  
# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: meow #hiero
#freemind 
#next

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repository: git@masonblog:lhhroots/lhhroots.github.io.git
  branch: master


baidu_url_submit:
  count: 100
  host: www.lihanghang.top
  token: '' # 请通过环境变量或私有配置注入
  path: baidu_urls.txt

nofollow:
  enable: true
  exclude:
  - lihanghang.top
reward_comment: 赏一个 e(=2.72) ，您的支持将鼓励我继续创作与分享！
wechatpay: /images/wechatPay.png
#alipay: /images/aipay.png

# Fancybox. There is support for old version 2 and new version 3.
# Please, choose only any one variant, do not need to install both.
# For install 2.x: https://github.com/theme-next/theme-next-fancybox
# For install 3.x: https://github.com/theme-next/theme-next-fancybox3
fancybox: true
search:
  path: search.xml
  field: post
  format: html
  limit: 10000


# 自动生成sitemap
sitemap:
  path: sitemap.xml
baidusitemap:
  path: baidusitemap.xml

# RSS Feed
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  order_by: -date
  icon: /images/logo.jpeg
  autodiscovery: true


